<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Notice Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.cdnfonts.com/css/solaimanlipi" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: 'SolaimanLipi', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        
        /* A4 Page Styling - EXACT MEASUREMENTS */
        .a4-wrapper {
            background: white;
            width: 210mm;
            height: 297mm;
            padding: 15mm 20mm;
            margin: 0 auto;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        /* Scaled Preview for UI */
        .preview-box {
            width: 100%;
            height: 85vh;
            overflow-y: auto;
            background: #d1d5db;
            padding: 40px 0;
            border-radius: 12px;
        }

        /* This scales the A4 page to fit the screen without breaking proportions */
        @media (min-width: 1024px) {
            .scaled-content {
                transform: scale(0.65); /* ডেস্কটপে প্রিভিউ ছোট দেখাবে কিন্তু ডাউনলোড বড় হবে */
                transform-origin: top center;
                margin-bottom: -100mm; 
            }
        }

        @media (max-width: 1023px) {
            .scaled-content {
                transform: scale(0.4);
                transform-origin: top center;
                margin-bottom: -180mm;
            }
        }

        .watermark {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70%; opacity: 0.05;
            z-index: 0; pointer-events: none;
        }

        .main-content { position: relative; z-index: 10; flex-grow: 1; display: flex; flex-direction: column; }

        /* Typography */
        .ql-editor { 
            padding: 0 !important; 
            text-align: justify; 
            line-height: 1.6; 
            font-size: 22px; /* Standard Notice Size */
            min-height: 400px;
        }

        /* PRINT SETTINGS - CRITICAL */
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .preview-box { background: white; padding: 0; overflow: visible; height: auto; }
            .scaled-content { transform: none !important; margin: 0 !important; }
            .a4-wrapper { box-shadow: none; margin: 0; border: none; }
        }
    </style>
</head>
<body class="p-4 md:p-6">

<div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
    
    <div class="lg:col-span-4 no-print">
        <div class="bg-white p-6 rounded-2xl shadow-xl sticky top-6 border-t-8 border-blue-600">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Notice Control</h2>
            
            <div class="space-y-4">
                <input type="text" id="in-title" placeholder="নোটিশ শিরোনাম" class="w-full border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                <input type="text" id="in-date" placeholder="তারিখ (উদা: ০৬ এপ্রিল ২০২৬)" class="w-full border-2 p-3 rounded-lg focus:border-blue-500 outline-none">
                
                <div class="border-2 rounded-lg overflow-hidden">
                    <div id="toolbar">
                        <span class="ql-formats">
                            <button class="ql-bold"></button>
                            <button class="ql-italic"></button>
                            <select class="ql-color"></select>
                            <select class="ql-align"></select>
                        </span>
                    </div>
                    <div id="editor" style="height: 250px;"></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-2 rounded border">
                        <span class="text-[10px] uppercase font-bold text-gray-500">সভাপতির স্বাক্ষর</span>
                        <input type="file" onchange="loadSig(event, 's1')" class="text-xs mt-1 w-full">
                    </div>
                    <div class="bg-gray-50 p-2 rounded border">
                        <span class="text-[10px] uppercase font-bold text-gray-500">সম্পাদকের স্বাক্ষর</span>
                        <input type="file" onchange="loadSig(event, 's2')" class="text-xs mt-1 w-full">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="saveAsImage()" class="bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 shadow-lg transition">Save Image</button>
                <button onclick="window.print()" class="bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700 shadow-lg transition">Print A4</button>
            </div>
        </div>
    </div>

    <div class="lg:col-span-8">
        <div class="preview-box">
            <div class="scaled-content">
                <div id="capture-area" class="a4-wrapper">
                    <img src="YOUR_LOGO_URL" class="watermark">

                    <div class="main-content">
                        <div class="flex justify-between items-center border-b-[3px] border-black pb-4 mb-8">
                            <img src="LEFT_LOGO" class="h-24 w-auto">
                            <div class="text-center">
                                <h1 class="text-5xl font-black text-blue-800 tracking-tight">গণিত ক্লাব</h1>
                                <p class="text-xl font-bold mt-1">আনন্দ মোহন কলেজ, ময়মনসিংহ</p>
                            </div>
                            <img src="RIGHT_LOGO" class="h-24 w-auto">
                        </div>

                        <div class="text-center mb-8">
                            <h2 id="out-title" class="text-3xl font-bold border-b-2 border-black inline-block px-8 pb-1">নোটিশ-০১</h2>
                        </div>

                        <p class="text-2xl font-bold mb-8 text-black">তারিখঃ <span id="out-date">০৬ এপ্রিল ২০২৬</span></p>

                        <div id="out-body" class="ql-editor">
                            এখানে আপনার নোটিশের বিস্তারিত তথ্য লিখুন...
                        </div>

                        <div class="mt-auto mb-12 grid grid-cols-2 gap-20">
                            <div class="text-center">
                                <div class="h-20 flex items-end justify-center mb-1">
                                    <img id="s1" class="max-h-full hidden">
                                </div>
                                <div class="border-t-2 border-dashed border-black pt-2">
                                    <p class="font-bold text-lg">সভাপতি</p>
                                    <p class="text-sm font-semibold">গণিত ক্লাব</p>
                                    <p class="text-[12px]">আনন্দ মোহন কলেজ, ময়মনসিংহ</p>
                                </div>
                            </div>
                            <div class="text-center">
                                <div class="h-20 flex items-end justify-center mb-1">
                                    <img id="s2" class="max-h-full hidden">
                                </div>
                                <div class="border-t-2 border-dashed border-black pt-2">
                                    <p class="font-bold text-lg">সাধারণ সম্পাদক</p>
                                    <p class="text-sm font-semibold">গণিত ক্লাব</p>
                                    <p class="text-[12px]">আনন্দ মোহন কলেজ, ময়মনসিংহ</p>
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-center mt-6">
                            <div class="bg-[#1877F2] text-white flex items-center gap-3 px-6 py-2 rounded-full shadow-md">
                                <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                                <span class="font-bold text-lg tracking-wide">MathClubAnandaMohanCollege</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialize Quill with full tools
    var quill = new Quill('#editor', {
        modules: { toolbar: '#toolbar' },
        theme: 'snow',
        placeholder: 'এখানে নোটিশ টাইপ করুন...'
    });

    // Real-time Updates
    const inT = document.getElementById('in-title');
    const inD = document.getElementById('in-date');
    const outT = document.getElementById('out-title');
    const outD = document.getElementById('out-date');
    const outB = document.getElementById('out-body');

    inT.addEventListener('input', () => outT.innerText = inT.value || 'নোটিশ-০১');
    inD.addEventListener('input', () => outD.innerText = inD.value || '০৬ এপ্রিল ২০২৬');
    
    quill.on('text-change', () => {
        outB.innerHTML = quill.root.innerHTML;
        
        // Auto-size font based on text volume
        let len = quill.getText().trim().length;
        if(len > 1200) outB.style.fontSize = "16px";
        else if(len > 700) outB.style.fontSize = "19px";
        else outB.style.fontSize = "24px";
    });

    function loadSig(e, targetId) {
        const file = e.target.files[0];
        if (file) {
            const img = document.getElementById(targetId);
            img.src = URL.createObjectURL(file);
            img.classList.remove('hidden');
        }
    }

    // High Quality Image Export
    function saveAsImage() {
        const area = document.getElementById('capture-area');
        
        // Temporarily reset scaling for perfect capture
        html2canvas(area, {
            scale: 3, // Very high resolution
            useCORS: true,
            logging: false,
            backgroundColor: "#ffffff",
            windowWidth: 794, // A4 pixel width at 96dpi
            windowHeight: 1123
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Official_Notice.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>

</body>
  </html>
