<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Notice Maker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.cdnfonts.com/css/solaimanlipi" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: 'SolaimanLipi', sans-serif; background-color: #f0f2f5; }
        
        /* Dashboard Preview Styling */
        .preview-box {
            height: calc(100vh - 100px);
            overflow-y: auto;
            background: #374151;
            padding: 40px;
            display: flex;
            justify-content: center;
            border-radius: 16px;
        }

        .scaled-view {
            transform: scale(0.6);
            transform-origin: top center;
        }

        /* Standard A4 Paper Design */
        #notice-printable {
            background: white;
            width: 210mm;
            height: 297mm;
            padding: 20mm;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            color: black;
        }

        .watermark {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70%; opacity: 0.06;
            z-index: 0; pointer-events: none;
        }

        .content-layer { position: relative; z-index: 10; flex-grow: 1; display: flex; flex-direction: column; }

        /* Typography */
        .notice-body-text { 
            text-align: justify; 
            line-height: 1.8; 
            font-size: 20px; 
            min-height: 450px;
            word-wrap: break-word;
        }

        /* Hide Iframe from UI */
        #print-iframe { display: none; }

        @media screen and (max-width: 1024px) {
            .scaled-view { transform: scale(0.4); }
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <div class="lg:col-span-4 space-y-6">
        <div class="bg-white p-6 rounded-2xl shadow-xl border-t-8 border-blue-600">
            <h2 class="text-2xl font-bold mb-6 text-blue-800 border-b pb-2">Notice Editor</h2>
            
            <div class="space-y-4">
                <input type="text" id="in-title" placeholder="নোটিশ শিরোনাম (উদা: জরুরি নোটিশ)" class="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500 transition-all">
                <input type="text" id="in-date" placeholder="তারিখ (উদা: ০৭ এপ্রিল ২০২৬)" class="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500 transition-all">
                
                <div class="border-2 rounded-xl overflow-hidden shadow-sm">
                    <div id="toolbar">
                        <span class="ql-formats">
                            <button class="ql-bold"></button>
                            <button class="ql-italic"></button>
                            <select class="ql-align"></select>
                            <select class="ql-color"></select>
                        </span>
                    </div>
                    <div id="editor" style="height: 300px; font-size: 16px;"></div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
                        <label class="text-[11px] font-bold text-blue-700 uppercase">সভাপতির স্বাক্ষর</label>
                        <input type="file" onchange="loadSignature(event, 'sig1')" class="text-[10px] w-full mt-1">
                    </div>
                    <div class="bg-indigo-50 p-3 rounded-lg border border-indigo-100">
                        <label class="text-[11px] font-bold text-indigo-700 uppercase">সম্পাদকের স্বাক্ষর</label>
                        <input type="file" onchange="loadSignature(event, 'sig2')" class="text-[10px] w-full mt-1">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-4">
                    <button onclick="saveAsImage()" class="bg-gray-800 text-white font-bold py-4 rounded-2xl hover:bg-black shadow-lg transition-all active:scale-95">Save Image</button>
                    <button onclick="premiumPrint()" class="bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                        Print Now
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="lg:col-span-8">
        <div class="preview-box shadow-inner">
            <div class="scaled-view">
                <div id="notice-printable">
                    <img src="https://i.ibb.co.com/7t41Zgzd/Untitled-design-20260406-235728-0000.png" class="watermark">

                    <div class="content-layer">
                        <div class="flex justify-between items-center border-b-[5px] border-blue-900 pb-5 mb-10">
                            <img src="https://i.ibb.co.com/7t41Zgzd/Untitled-design-20260406-235728-0000.png" class="h-32 w-auto object-contain">
                            <div class="text-center">
                                <h1 class="text-7xl font-black text-blue-800 tracking-tighter">গণিত ক্লাব</h1>
                                <p class="text-3xl font-bold mt-2 text-gray-700">আনন্দ মোহন কলেজ, ময়মনসিংহ</p>
                                <div class="h-1 w-24 bg-red-600 mx-auto mt-2"></div>
                            </div>
                            <img src="https://i.ibb.co.com/FLHqcSdk/dclogo.png" class="h-32 w-auto object-contain">
                        </div>

                        <div class="flex justify-between items-center mb-10">
                            <div class="bg-blue-800 text-white px-8 py-2 rounded-r-full -ml-[20mm]">
                                <h2 id="out-title" class="text-2xl font-bold">নোটিশ-০১</h2>
                            </div>
                            <div class="text-right">
                                <p class="text-2xl font-bold">তারিখঃ <span id="out-date" class="border-b-2 border-black">০৭ এপ্রিল ২০২৬</span></p>
                            </div>
                        </div>

                        <div id="out-body" class="notice-body-text ql-editor">
                            এখানে আপনার নোটিশের মূল বক্তব্য টাইপ করুন...
                        </div>

                        <div class="mt-auto mb-12 grid grid-cols-2 gap-32 px-10">
                            <div class="text-center">
                                <div class="h-28 flex items-end justify-center mb-2">
                                    <img id="sig1" class="max-h-full transition-all duration-500" style="display:none">
                                </div>
                                <div class="border-t-2 border-black pt-2">
                                    <p class="font-bold text-2xl text-gray-900">সভাপতি</p>
                                    <p class="text-lg text-gray-600">গণিত ক্লাব</p>
                                </div>
                            </div>
                            <div class="text-center">
                                <div class="h-28 flex items-end justify-center mb-2">
                                    <img id="sig2" class="max-h-full transition-all duration-500" style="display:none">
                                </div>
                                <div class="border-t-2 border-black pt-2">
                                    <p class="font-bold text-2xl text-gray-900">সাধারণ সম্পাদক</p>
                                    <p class="text-lg text-gray-600">গণিত ক্লাব</p>
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-center border-t-2 pt-8">
                            <div class="bg-[#1877F2] text-white flex items-center gap-4 px-10 py-3 rounded-full shadow-lg">
                                <svg class="w-8 h-8 fill-current" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                                <span class="font-black text-xl tracking-wide">MathClubAnandaMohanCollege</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<iframe id="print-iframe"></iframe>

<script>
    // Initialize Editor
    var quill = new Quill('#editor', {
        modules: { toolbar: '#toolbar' },
        theme: 'snow',
        placeholder: 'বিস্তারিত নোটিশ এখানে লিখুন...'
    });

    const inT = document.getElementById('in-title');
    const inD = document.getElementById('in-date');
    const outT = document.getElementById('out-title');
    const outDate = document.getElementById('out-date');
    const outB = document.getElementById('out-body');

    // Real-time Update
    inT.addEventListener('input', () => outT.innerText = inT.value || 'নোটিশ-০১');
    inD.addEventListener('input', () => outDate.innerText = inD.value || '০৭ এপ্রিল ২০২৬');
    
    quill.on('text-change', () => {
        outB.innerHTML = quill.root.innerHTML;
        // Dynamic Font Sizing
        let textLen = quill.getText().trim().length;
        outB.style.fontSize = (textLen > 1000) ? "17px" : "21px";
    });

    function loadSignature(event, id) {
        const file = event.target.files[0];
        if (file) {
            const img = document.getElementById(id);
            img.src = URL.createObjectURL(file);
            img.style.display = 'block';
        }
    }

    // --- Premium Professional Print Function ---
    function premiumPrint() {
        const printContent = document.getElementById('notice-printable').innerHTML;
        const iframe = document.getElementById('print-iframe');
        const iframeDoc = iframe.contentWindow.document;

        const html = `
            <html>
                <head>
                    <title>Print Notice</title>
                    <link href="https://fonts.cdnfonts.com/css/solaimanlipi" rel="stylesheet">
                    <script src="https://cdn.tailwindcss.com"><\/script>
                    <style>
                        body { margin: 0; padding: 0; background: white; font-family: 'SolaimanLipi', sans-serif; }
                        .a4-page {
                            width: 210mm;
                            height: 297mm;
                            padding: 20mm;
                            margin: 0;
                            position: relative;
                            box-sizing: border-box;
                            display: flex;
                            flex-direction: column;
                            background: white;
                        }
                        .watermark {
                            position: absolute; top: 50%; left: 50%;
                            transform: translate(-50%, -50%);
                            width: 70%; opacity: 0.06; z-index: 0;
                        }
                        .content-layer { position: relative; z-index: 10; flex-grow: 1; display: flex; flex-direction: column; }
                        .ql-editor { text-align: justify; line-height: 1.8; font-size: 21px; }
                        @media print {
                            body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
                        }
                    </style>
                </head>
                <body>
                    <div class="a4-page">
                        ${printContent}
                    </div>
                    <script>
                        // Wait for images to load before printing
                        window.onload = function() {
                            window.print();
                        };
                    <\/script>
                </body>
            </html>
        `;

        iframeDoc.open();
        iframeDoc.write(html);
        iframeDoc.close();
    }

    function saveAsImage() {
        const area = document.getElementById('notice-printable');
        html2canvas(area, { 
            scale: 3, 
            useCORS: true, 
            logging: false,
            backgroundColor: "#ffffff" 
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Official_Notice.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>

</body>
</html>
